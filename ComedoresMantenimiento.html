<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página en mantenimiento</title>

    <style>
        :root {
            --color-primary: #1a3a6b;
            --color-dark: #0d2240;
            --color-accent: #c8a84b;
            --color-bg: #f5f6f8;
            --color-white: #ffffff;
            --font-main: 'Barlow', sans-serif;
            --radius: 6px;
        }

        body {
            margin: 0;
            font-family: var(--font-main);
            background: var(--color-bg);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        .mantenimiento-box {
            background: var(--color-white);
            padding: 40px;
            border-radius: var(--radius);
            box-shadow: 0 6px 24px rgba(0,0,0,.13);
            max-width: 500px;
        }

        .mantenimiento-box img {
            width: 250px;
            margin-bottom: 20px;
        }

        h1 {
            color: var(--color-primary);
            margin-bottom: 10px;
        }

        p {
            color: #555;
            margin-bottom: 25px;
        }

        .btn-volver {
            display: inline-block;
            background: var(--color-primary);
            color: white;
            padding: 10px 20px;
            border-radius: var(--radius);
            text-decoration: none;
            transition: 0.3s;
        }

        .btn-volver:hover {
            background: var(--color-dark);
        }
    </style>

    <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;600;700&display=swap" rel="stylesheet">
</head>

<body>

    <div class="mantenimiento-box">
        <!-- Imagen -->
        <img src="https://www.gestionderiesgos.gob.ec/wp-content/uploads/2019/11/mantenimiento-web.png" alt="Mantenimiento">

        <!-- Texto -->
        <h1>Lo sentimos</h1>
        <p>La página se encuentra en mantenimiento. Intente nuevamente más tarde.</p>

        <!-- Botón -->
        <a href="../index.html" class="btn-volver">Volver al inicio</a>
    </div>

</body>
</html>

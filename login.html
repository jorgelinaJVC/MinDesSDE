        <div class="lottie-container">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 3840 2160" preserveAspectRatio="xMidYMid slice">

                        <stop offset="100%" style="stop-color:#0d2240;stop-opacity:0.5" />
                    </linearGradient>
                </defs>
                <rect width="3840" height="2160" fill="url(#grad1)" />
                <circle class="blob" cx="1000" cy="500" r="600" fill="#4a90d9" opacity="0.1" />
                <circle class="blob delay" cx="2800" cy="1500" r="800" fill="#c8a84b" opacity="0.05" />
            </svg>
        </div>
    </div>

    <div class="login-container">
        <div class="login-card">
            <div class="header">
                <div class="logo-container">
                    <svg width="80" height="66" viewBox="0 0 200 180" xmlns="http://www.w3.org/2000/svg">
                        <path d="M70,25 C40,25 20,45 20,75 C20,110 60,140 130,155 C110,145 45,125 45,75 C45,55 55,45 70,45 C85,45 95,55 95,55 L105,40 C105,40 90,25 70,25 Z" fill="#ffffff" />

                    </svg>
                </div>
                <h1 class="title">Bienvenido</h1>
                <p class="subtitle">Ingresa tus credenciales para continuar</p>
            </div>

            <form id="loginForm">
                <div class="form-group">
                    <label for="username">Usuario / Email</label>
                    <input type="text" class="input-field" id="username" placeholder="Ej: jdoe@sistema.com" required>
                </div>
                
                <div class="form-group">
                    <div class="label-wrapper">
                        <label for="password">Contraseña</label>
                        <a href="#" class="forgot-link">¿Olvidaste tu contraseña?</a>
                    </div>
                    <input type="password" class="input-field" id="password" placeholder="••••••••" required>
                </div>

              <div class="captcha-box" id="captchaContainer">
    <div class="captcha-content" id="captchaInitial">
        <label class="captcha-check">
            <input type="checkbox" id="captcha">
            <span class="checkmark"></span>
            No soy un robot
        </label>
        <img src="https://www.gstatic.com/recaptcha/api2/logo_48.png" alt="reCAPTCHA" width="30">
    </div>
    
    <div class="captcha-success" id="captchaSuccess" style="display: none;">
        <div class="success-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
        </div>
        <span class="success-text">Success!</span>
        <img src="https://www.gstatic.com/recaptcha/api2/logo_48.png" alt="reCAPTCHA" width="30">
    </div>
</div>

                <button type="submit" class="submit-btn">Iniciar Sesión</button>

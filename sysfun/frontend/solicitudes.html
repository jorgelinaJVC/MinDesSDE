<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solicitudes - Servicios Funebres</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- MENÚ SUPERIOR -->
    <nav class="top-nav">
        <div class="logo">
            <i class="fas fa-cross"></i>
            <span>Sistema Funebre</span>
        </div>
        <button class="hamburger" id="hamburgerBtn"><i class="fas fa-bars"></i></button>
        <ul class="nav-links" id="navLinks">
            <li><a href="panel_datos.html"><i class="fas fa-home"></i> Panel de Datos</a></li>
            <li><a href="solicitudes.html" class="active"><i class="fas fa-file-alt"></i> Solicitudes</a></li>
            <li><a href="empleados.html"><i class="fas fa-users"></i> Empleados</a></li>
            <li><a href="ataudes.html"><i class="fas fa-box"></i> Ataúdes</a></li>
            <li><a href="vehiculos.html"><i class="fas fa-truck"></i> Vehículos</a></li>
            <li><a href="proveedores.html"><i class="fas fa-building"></i> Proveedores</a></li>
            <li><a href="reportes.html"><i class="fas fa-chart-bar"></i> Reportes</a></li>
        </ul>
        <div class="user-menu">
            <span id="userName">Usuario</span>
            <button class="btn-logout" id="btnLogout"><i class="fas fa-sign-out-alt"></i> Cerrar Sesión</button>
        </div>
    </nav>

    <!-- CONTENIDO PRINCIPAL -->
    <main class="main-content">
        <header class="page-header">
            <div class="header-left">
                <h1>📋 Gestión de Solicitudes</h1>
                <p>Listado completo de todas las solicitudes</p>
            </div>
            <div class="header-actions">
                <button class="btn btn-success" onclick="window.location.href='nueva_sol.html'">
                    <i class="fas fa-plus"></i> Nueva Solicitud
                </button>
            </div>
        </header>

        <div class="table-container">
            <div class="table-header">
                <h2><i class="fas fa-list"></i> Todas las Solicitudes</h2>
            </div>
            <div class="table-responsive">
                <table>
                    <thead>
                        <tr>
                            <th>Nº Pedido</th>
                            <th>Fallecido</th>
                            <th>Responsable</th>
                            <th>Fecha</th>
                            <th>Servicio</th>
                            <th>Estado</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="tablaSolicitudes">
                        <!-- Se llena con JS -->
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script src="js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const hamburger = document.getElementById('hamburgerBtn');
            const navLinks = document.getElementById('navLinks');
            if (hamburger && navLinks) {
                hamburger.addEventListener('click', function() {
                    navLinks.classList.toggle('open');
                });
            }
        });
    </script>
</body>
</html>

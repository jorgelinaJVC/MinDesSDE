<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vehículos - Servicios Funebres</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- MENÚ SUPERIOR -->
    <nav class="top-nav">
        <div class="logo">
            <i class="fas fa-cross"></i>
            <span>Sistema Funebre</span>
        </div>
        <button class="hamburger" id="hamburgerBtn"><i class="fas fa-bars"></i></button>
        <ul class="nav-links" id="navLinks">
            <li><a href="panel_datos.html"><i class="fas fa-home"></i> Panel de Datos</a></li>
            <li><a href="solicitudes.html"><i class="fas fa-file-alt"></i> Solicitudes</a></li>
            <li><a href="empleados.html"><i class="fas fa-users"></i> Empleados</a></li>
            <li><a href="ataudes.html"><i class="fas fa-box"></i> Ataúdes</a></li>
            <li><a href="vehiculos.html" class="active"><i class="fas fa-truck"></i> Vehículos</a></li>
            <li><a href="proveedores.html"><i class="fas fa-building"></i> Proveedores</a></li>
            <li><a href="reportes.html"><i class="fas fa-chart-bar"></i> Reportes</a></li>
        </ul>
        <div class="user-menu">
            <span id="userName">Usuario</span>
            <button class="btn-logout" id="btnLogout"><i class="fas fa-sign-out-alt"></i> Cerrar Sesión</button>
        </div>
    </nav>

    <!-- CONTENIDO PRINCIPAL -->
    <main class="main-content">
        <header class="page-header">
            <div class="header-left">
                <h1>🚗 Gestión de Vehículos</h1>
                <p>Listado completo de vehículos de la flota</p>
            </div>
            <div class="header-actions">
                <button class="btn btn-success" onclick="mostrarFormularioVehiculo()">
                    <i class="fas fa-plus"></i> Nuevo Vehículo
                </button>
            </div>
        </header>

        <!-- Formulario de Vehículos -->
        <div id="formContainer" class="form-container hidden">
            <h2 id="formTitle">Nuevo Vehículo</h2>
            <form id="vehiculoForm">
                <input type="hidden" id="editId" value="">
                <div class="form-row">
                    <div class="form-group">
                        <label>Patente *</label>
                        <input type="text" id="patente" required>
                    </div>
                    <div class="form-group">
                        <label>Número Interno</label>
                        <input type="text" id="numero_interno">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Marca *</label>
                        <input type="text" id="marca" required>
                    </div>
                    <div class="form-group">
                        <label>Modelo *</label>
                        <input type="text" id="modelo" required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Año</label>
                        <input type="number" id="año">
                    </div>
                    <div class="form-group">
                        <label>Tipo *</label>
                        <select id="tipo" required>
                            <option value="">Seleccionar</option>
                            <option value="FURGON">Furgón</option>
                            <option value="AUTO">Auto</option>
                            <option value="CAMIONETA">Camioneta</option>
                        </select>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Capacidad Ataúdes *</label>
                        <input type="number" id="capacidad_ataudes" required>
                    </div>
                    <div class="form-group">
                        <label>Capacidad Acompañantes *</label>
                        <input type="number" id="capacidad_acompañantes" required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Estado *</label>
                        <select id="estado" required>
                            <option value="DISPONIBLE">Disponible</option>
                            <option value="EN_USO">En Uso</option>
                            <option value="EN_MANTENIMIENTO">En Mantenimiento</option>
                            <option value="FUERA_DE_SERVICIO">Fuera de Servicio</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Activo</label>
                        <select id="activo">
                            <option value="1">Activo</option>
                            <option value="0">Inactivo</option>
                        </select>
                    </div>
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Guardar</button>
                    <button type="button" class="btn btn-secondary" onclick="ocultarFormularioVehiculo()"><i class="fas fa-times"></i> Cancelar</button>
                </div>
            </form>
        </div>

        <!-- Tabla -->
        <div class="table-container">
            <div class="table-header">
                <h2><i class="fas fa-list"></i> Listado de Vehículos</h2>
            </div>
            <div class="table-responsive">
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Patente</th>
                            <th>Marca/Modelo</th>
                            <th>Tipo</th>
                            <th>Capacidad</th>
                            <th>Estado</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="tablaVehiculos">
                        <!-- Se llena con JS -->
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script src="js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const hamburger = document.getElementById('hamburgerBtn');
            const navLinks = document.getElementById('navLinks');
            if (hamburger && navLinks) {
                hamburger.addEventListener('click', function() {
                    navLinks.classList.toggle('open');
                });
            }
        });
    </script>
</body>
</html>
